name: OSCAL Validation

on:
  pull_request:
    paths:
      - 'oscal/**'
      - 'scripts/**'
  push:
    branches:
      - main
    paths:
      - 'oscal/**'

jobs:
  validate-oscal:
    name: Validate OSCAL SSPP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install jsonschema pydantic

      - name: Stage 1 - JSON syntax check
        run: |
          python -c "
          import json, sys
          try:
              with open('oscal/sspp.json') as f:
                  json.load(f)
              print('✓ JSON syntax valid')
          except json.JSONDecodeError as e:
              print(f'✗ JSON syntax error: {e}')
              sys.exit(1)
          "

      - name: Stage 2 - Check required OSCAL fields
        run: |
          python -c "
          import json, sys
          with open('oscal/sspp.json') as f:
              oscal = json.load(f)

          required_paths = [
              ['system-security-plan'],
              ['system-security-plan', 'uuid'],
              ['system-security-plan', 'metadata'],
              ['system-security-plan', 'system-characteristics'],
              ['system-security-plan', 'system-implementation'],
              ['system-security-plan', 'control-implementation'],
              ['system-security-plan', 'control-implementation', 'implemented-requirements'],
          ]

          errors = []
          for path in required_paths:
              obj = oscal
              for key in path:
                  if not isinstance(obj, dict) or key not in obj:
                      errors.append(f'Missing required field: {\" > \".join(path)}')
                      break
                  obj = obj[key]

          if errors:
              for e in errors:
                  print(f'✗ {e}')
              sys.exit(1)
          else:
              reqs = oscal['system-security-plan']['control-implementation']['implemented-requirements']
              print(f'✓ OSCAL structure valid — {len(reqs)} controls found')
          "

      - name: Stage 3 - Verify no secrets in OSCAL
        run: |
          python -c "
          import json, sys, re
          with open('oscal/sspp.json') as f:
              content = f.read()

          # Look for patterns that suggest hardcoded secrets
          suspicious_patterns = [
              r'(?i)(password|secret|token|key)\s*[=:]\s*[a-zA-Z0-9+/]{20,}',
              r'AKIA[0-9A-Z]{16}',  # AWS access key pattern
          ]

          found = []
          for pattern in suspicious_patterns:
              if re.search(pattern, content):
                  found.append(pattern)

          if found:
              print('✗ Possible credentials detected in OSCAL file. Review before committing.')
              sys.exit(1)
          else:
              print('✓ No credential patterns detected')
          "

      - name: Stage 4 - Control coverage summary
        run: |
          python -c "
          import json
          with open('oscal/sspp.json') as f:
              oscal = json.load(f)

          reqs = oscal['system-security-plan']['control-implementation']['implemented-requirements']
          statuses = {}
          for req in reqs:
              for stmt in req.get('statements', []):
                  for by_comp in stmt.get('by-components', []):
                      status = by_comp.get('implementation-status', {}).get('state', 'unknown')
                      statuses[status] = statuses.get(status, 0) + 1
                      break
                  break

          print('Control coverage summary:')
          for status, count in sorted(statuses.items()):
              print(f'  {status}: {count}')
          "

      - name: Comment on PR with validation results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ OSCAL validation passed — JSON syntax, required fields, and security checks all clear.'
            })
